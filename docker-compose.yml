# bubblealba 클론 — 로컬 개발용 PostgreSQL
# 사용법:
#   docker compose up -d         # 백그라운드 실행
#   docker compose logs -f db    # 로그 보기
#   docker compose down          # 중지
#   docker compose down -v       # 중지 + 볼륨 삭제 (DB 초기화)
#
# Docker 미설치 시 대안:
#   1. Prisma Postgres 무료: cd clone-app && npx create-db
#   2. Neon (https://neon.tech) 또는 Supabase (https://supabase.com) 가입 후 URL 복사
#   3. Windows 네이티브 설치: https://www.postgresql.org/download/windows/

services:
  db:
    image: postgres:17-alpine
    container_name: bubble-clone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bubbleuser
      POSTGRES_PASSWORD: bubblepass
      POSTGRES_DB: bubbleclone
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - bubble_clone_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bubbleuser -d bubbleclone"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bubble_clone_data:
    driver: local
